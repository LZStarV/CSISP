Login:
  post:
    operationId: auth_login
    tags: [auth]
    summary: Login with email and password
    parameters:
      - $ref: ../../shared/components/parameters/x-trace-id.yaml#/XTraceId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/auth.yaml#/LoginInternalDto
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: ../components/schemas/auth.yaml#/LoginResult
      '400':
        $ref: ../../shared/components/responses/common.yaml#/BadRequest
      '401':
        $ref: ../../shared/components/responses/common.yaml#/Unauthorized
      '429':
        $ref: ../../shared/components/responses/common.yaml#/TooManyRequests
      '500':
        $ref: ../../shared/components/responses/common.yaml#/ServerError
