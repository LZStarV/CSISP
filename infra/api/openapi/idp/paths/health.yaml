HealthStatus:
  get:
    operationId: health_status
    tags: [health]
    summary: Service health status
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required: [ok, ts]
              properties:
                ok:
                  type: boolean
                ts:
                  type: integer
      '500':
        $ref: ../../shared/components/responses/common.yaml#/ServerError
HealthUpstash:
  get:
    operationId: health_upstash
    tags: [health]
    summary: Upstash Redis connectivity via Supabase Edge Function
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required: [ok]
              properties:
                ok:
                  type: boolean
                region:
                  type: string
                  nullable: true
                count:
                  type: integer
                  nullable: true
      '500':
        $ref: ../../shared/components/responses/common.yaml#/ServerError
