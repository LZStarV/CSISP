name: Build idp-server
on:
  push:
    branches:
      - main
    paths:
      - "apps/idp/server/**"
      - "packages/**"
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.set.outputs.affected }}
      tag: ${{ steps.set.outputs.tag }}
      owner: ${{ steps.set.outputs.owner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Detect changes
        id: set
        run: |
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ]; then BASE="$(git rev-parse HEAD~1)"; fi
          CHANGED_FILES="$(git diff --name-only "$BASE" "${{ github.sha }}")"
          AFFECTED="false"
          echo "$CHANGED_FILES" | grep -q '^apps/idp/server/' && AFFECTED="true"
          if [ "$AFFECTED" = "false" ]; then
            DEPS="$(jq -r '.dependencies, .devDependencies | keys[]?' apps/idp/server/package.json | grep '^@csisp/' || true)"
            CHANGED_DIRS="$(echo "$CHANGED_FILES" | grep '^packages/' | awk -F/ '{print $2}' | sort -u)"
            for d in $CHANGED_DIRS; do
              PKG_NAME="$(jq -r '.name' "packages/$d/package.json" 2>/dev/null || true)"
              if echo "$DEPS" | grep -q "$PKG_NAME"; then AFFECTED="true"; break; fi
            done
          fi
          TAG="0.1.0-${{ github.sha }}"
          OWNER="${{ github.repository_owner }}"
          echo "affected=$AFFECTED" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
  build:
    if: ${{ needs.detect.outputs.affected == 'true' }}
    needs: detect
    uses: ./.github/workflows/build-push-image.yml
    with:
      registry_owner: ${{ needs.detect.outputs.owner }}
      image_name: csisp-idp-server
      context: ./apps/idp/server
      tag: ${{ needs.detect.outputs.tag }}
