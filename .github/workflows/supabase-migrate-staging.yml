name: Migrate Supabase Staging

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - 'supabase/seed.sql'
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - 'supabase/seed.sql'
  workflow_dispatch:

concurrency:
  group: supabase-staging-migrations
  cancel-in-progress: false

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_URL_REF: ${{ secrets.SUPABASE_URL_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }} # staging database URL with sslmode=require
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: v2.75.0
      - name: Preflight checks
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN (staging environment secret)"; exit 1
          fi
          if [ -z "${SUPABASE_URL_REF:-}" ]; then
            echo "Missing SUPABASE_URL_REF (staging environment secret)"; exit 1
          fi
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing DATABASE_URL (staging environment secret)"; exit 1
          fi
          supabase --version
      - name: Link to Staging Project
        run: supabase link --project-ref "$SUPABASE_URL_REF" --debug
        working-directory: supabase
      - name: Show Migration History (Before)
        run: supabase migration list --db-url "$DATABASE_URL"
        working-directory: supabase
      - name: Apply Migrations to Staging
        run: supabase migration up --db-url "$DATABASE_URL"
        working-directory: supabase
      - name: Show Migration History (After)
        run: supabase migration list --db-url "$DATABASE_URL"
        working-directory: supabase
