name: Build & Push Image
on:
  workflow_call:
    inputs:
      registry_owner:
        type: string
        required: true
      image_name:
        type: string
        required: true
      context:
        type: string
        required: true
      tag:
        type: string
        required: true
      build_args:
        type: string
        required: false
      platforms:
        type: string
        required: false
        default: linux/amd64
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ghcr.io/${{ inputs.registry_owner }}/${{ inputs.image_name }}:${{ inputs.tag }}
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build_args }}
