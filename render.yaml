previews:
  generation: off
services:
  - type: web
    runtime: node
    name: backend-integrated
    plan: free
    rootDir: .
    buildCommand: >
      pnpm i --frozen-lockfile -F @csisp/backend-integrated &&
      turbo run build --filter=@csisp/backend-integrated
    startCommand: pnpm -F @csisp/backend-integrated start
    envVars:
      - fromGroup: csisp-env-prod

  - type: web
    runtime: node
    name: bff
    plan: free
    rootDir: .
    buildCommand: >
      pnpm i --frozen-lockfile -F @csisp/bff &&
      turbo run build --filter=@csisp/bff
    startCommand: pnpm -F @csisp/bff start
    envVars:
      - fromGroup: csisp-env-prod

  - type: web
    runtime: node
    name: idp-server
    plan: free
    rootDir: .
    buildCommand: >
      pnpm i --frozen-lockfile -F @csisp/idp-server &&
      turbo run build --filter=@csisp/idp-server
    startCommand: pnpm -F @csisp/idp-server start
    healthCheckPath: /api/idp/health
    envVars:
      - fromGroup: csisp-env-prod

  - type: web
    runtime: static
    name: frontend-admin
    rootDir: .
    buildCommand: >
      pnpm i --frozen-lockfile -F @csisp/frontend-admin &&
      turbo run build --filter=@csisp/frontend-admin
    staticPublishPath: apps/frontend-admin/dist
    envVars:
      - fromGroup: csisp-env-prod
    previews:
      generation: off
    buildFilter:
      paths:
        - apps/frontend-admin/**
    routes:
      - type: rewrite
        source: /api/*
        destination: https://bff.onrender.com/api/

  - type: web
    runtime: static
    name: frontend-portal
    rootDir: .
    buildCommand: >
      pnpm i --frozen-lockfile -F @csisp/frontend-portal &&
      turbo run build --filter=@csisp/frontend-portal
    staticPublishPath: apps/frontend-portal/dist
    envVars:
      - fromGroup: csisp-env-prod
    previews:
      generation: off
    buildFilter:
      paths:
        - apps/frontend-portal/**
    routes:
      - type: rewrite
        source: /api/*
        destination: https://bff.onrender.com/api/

  - type: web
    runtime: static
    name: idp-client
    rootDir: .
    buildCommand: >
      pnpm i --frozen-lockfile -F @csisp/idp-client &&
      turbo run build --filter=@csisp/idp-client
    staticPublishPath: apps/idp/client/dist
    envVars:
      - fromGroup: csisp-env-prod
    previews:
      generation: off
    buildFilter:
      paths:
        - apps/idp/client/**
    routes:
      - type: rewrite
        source: /api/idp/*
        destination: https://idp-server.onrender.com/api/idp/

envVarGroups:
  - name: csisp-env-prod
    envVars: []
